<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message for You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff7eb9;
            --secondary: #ffb1de;
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #ffe0b2 100%);
            --glass: rgba(255, 255, 255, 0.25);
            --text-color: #7d4452;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        /* Floating Hearts Background */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: var(--primary);
            opacity: 0.6;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Main Card - Glassmorphism */
        .container {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            transition: all 0.5s ease;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #d81b60;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #yesBtn {
            background: #ff4081;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3);
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background: #f50057;
        }

        #noBtn {
            background: white;
            color: #ff4081;
            position: absolute;
            left: 55%; /* Starting point */
        }

        /* Celebration Screen */
        .hidden {
            display: none;
        }

        #celebration h1 {
            font-size: 3rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="hearts-container" id="hearts"></div>

    <div class="container" id="mainCard">
        <div id="content">
            <h1>Hey...</h1>
            <p id="message">From the moment I met you, everything changed. Every memory we've shared feels like a beautiful dream I never want to wake up from...</p>
            
            <div class="buttons">
                <button class="btn" id="yesBtn">Yes 💖</button>
                <button class="btn" id="noBtn">No 💔</button>
            </div>
        </div>

        <div id="celebration" class="hidden">
            <h1>Yay! 🎉</h1>
            <p>You just made me the happiest person alive! ❤️<br>I can't wait to spend forever with you.</p>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainCard = document.getElementById('mainCard');
        const content = document.getElementById('content');
        const celebration = document.getElementById('celebration');
        const heartContainer = document.getElementById('hearts');

        // 1. Create floating hearts background
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heartContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 300);

        // 2. The "No" Button Dodge Logic
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            // Move button to random position
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            
            // Playful feedback
            yesBtn.style.transform = `scale(${1 + (Math.random() * 0.5)})`;
        });

        noBtn.addEventListener('click', () => {
            alert("Nice try! But that's not an option 😉");
        });

        // 3. The "Yes" Button Logic
        yesBtn.addEventListener('click', () => {
            content.classList.add('hidden');
            celebration.classList.remove('hidden');
            
            // Intense heart explosion
            for(let i=0; i<50; i++) {
                setTimeout(createHeart, i * 20);
            }
            
            mainCard.style.background = "rgba(255, 255, 255, 0.4)";
        });
    </script>
</body>
</html>
