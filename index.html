<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
    --primary: #ff75a0;
    --glass: rgba(255, 255, 255, 0.25);
    --text: #4a1c2c;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Quicksand', sans-serif; }

body {
    height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #fee1e8 50%, #d1d9ff 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: var(--text);
}

.background-blobs {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    filter: blur(80px);
}
.blob {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: pink;
    opacity: 0.4;
    animation: move 20s infinite alternate;
}

@keyframes move {
    from { transform: translate(0, 0); }
    to { transform: translate(80vw, 80vh); }
}

.container {
    background: var(--glass);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 3rem;
    border-radius: 30px;
    text-align: center;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    z-index: 10;
}

h1, h2 {
    font-family: 'Dancing Script', cursive;
    color: #d81b60;
    margin-bottom: 15px;
}

h1 { font-size: 2.8rem; }
h3 { font-weight: 300; color: #7d4452; margin-bottom: 20px; }

.hidden { display: none !important; }

button {
    padding: 12px 28px;
    border: none;
    border-radius: 50px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

.continue {
    background: var(--primary);
    color: white;
    margin-top: 10px;
}

.yes {
    background: #ff4081;
    color: white;
    position: relative;
    z-index: 100;
}

.no {
    background: white;
    color: #ff4081;
    border: 1.5px solid #ff4081;
    position: absolute;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.stage { animation: fadeIn 0.8s ease; }
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<div class="background-blobs">
    <div class="blob" style="background: #ffc1e3; left: -5%; top: -5%;"></div>
    <div class="blob" style="background: #d1d9ff; right: -5%; bottom: -5%; animation-delay: -7s;"></div>
</div>

<div class="container" id="mainContainer">
    <div id="stage1" class="stage">
        <h2 id="text1"></h2>
        <button class="continue" onclick="nextStage(1)">Continue ✨</button>
    </div>

    <div id="stage2" class="stage hidden">
        <h2>I wasn’t planning this...</h2>
        <h3>But you became very special to me.</h3>
        <button class="continue" onclick="nextStage(2)">Next ❤️</button>
    </div>

    <div id="stage3" class="stage hidden">
        <h3>Every moment with you...</h3>
        <h3>Makes me smile a little more.</h3>
        <button class="continue" onclick="nextStage(3)">Continue...</button>
    </div>

    <div id="stage4" class="stage hidden">
        <h2>And I realized...</h2>
        <h3>I don't want to lose this feeling.</h3>
        <button class="continue" onclick="nextStage(4)">Actually...</button>
    </div>

    <div id="stage5" class="stage hidden">
        <h1>I'm falling for you.</h1>
        <button class="continue" onclick="nextStage(5)">One last thing...</button>
    </div>

    <div id="stage6" class="stage hidden" style="height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h1>Will you be mine? ❤️</h1>
        <div style="margin-top: 30px; width: 100%; position: relative; height: 100px;">
            <button class="yes" id="yesBtn" onclick="yesClicked()">Yes 💖</button>
            <button class="no" id="noBtn">No 💔</button>
        </div>
    </div>

    <div id="final" class="hidden stage">
        <h1>You just made me the happiest person alive ❤️</h1>
    </div>
</div>

<script>
const BOT_TOKEN = "8774692645:AAFQ39tVt-UHW9gsHUj_n1vTEoGE8e0TGzE"; 
const CHAT_ID = "6781151202";

// Typewriter
let introText = "Hey... I have something to tell you.";
let idx = 0;
function typeWriter() {
    if (idx < introText.length) {
        document.getElementById("text1").innerHTML += introText.charAt(idx);
        idx++;
        setTimeout(typeWriter, 70);
    }
}
window.onload = typeWriter;

function nextStage(current) {
    document.getElementById("stage"+current).classList.add("hidden");
    document.getElementById("stage"+(current+1)).classList.remove("hidden");
}

function sendTelegram(msg) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
    }).catch(e => {});
}

function yesClicked() {
    sendTelegram("SHE SAID YES! 🎉💖");
    document.getElementById("stage6").classList.add("hidden");
    document.getElementById("final").classList.remove("hidden");

    // Confetti
    var end = Date.now() + (10 * 1000);
    (function frame() {
        confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff4081', '#ff75a0'] });
        confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff4081', '#ff75a0'] });
        if (Date.now() < end) requestAnimationFrame(frame);
    }());
}

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
let noCount = 0;
let lastNotifyTime = 0;

noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("touchstart", moveNoButton); // Mobile support

function moveNoButton(e) {
    noCount++;
    
    // Position logic: Stay within screen bounds but move away from mouse
    const padding = 50;
    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;
    
    const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
    const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

    noBtn.style.position = "fixed";
    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";

    // Yes button subtly grows
    let currentScale = 1 + (noCount * 0.08);
    if(currentScale < 3) yesBtn.style.transform = `scale(${currentScale})`;

    // Telegram notification with 2s cooldown to avoid spamming too fast
    const now = Date.now();
    if (now - lastNotifyTime > 2000) {
        sendTelegram(`She tried to click No! 😭 (Total attempts: ${noCount})`);
        lastNotifyTime = now;
    }
}
</script>

</body>
</html>
